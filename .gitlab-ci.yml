stages:
  - test
  - build
  - deploy

# Define deployment target paths (change these if your server paths are different)
variables:
  BACKEND_DEPLOY_DIR: "/data/projects/docker-apps/Attend/backend"
  FRONTEND_DEPLOY_DIR: "/data/projects/docker-apps/Attend/frontend/dist"

# Cache Node modules across jobs to speed up builds
cache:
  key:
    files:
      - frontend/package-lock.json
      - backend/package-lock.json
  paths:
    - frontend/node_modules/
    - backend/node_modules/
    - .npm/

before_script:
  - npm config set cache "$(pwd)/.npm" --global

# Test job for backend
backend-test:
  stage: test
  script:
    - cd backend
    - npm ci
    # Optional: If backend tests are added in the future, uncomment the line below
    # - npm test

# Lint job for frontend
frontend-lint:
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run lint

# Build job for frontend
frontend-build:
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    name: "frontend-build-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/dist/
    expire_in: 1 week

# Deploy backend locally using PM2 (runs on the local shell runner)
deploy-backend:
  stage: deploy
  script:
    # 1. Ensure target backend directory exists
    - mkdir -p "$BACKEND_DEPLOY_DIR"
    # 2. Sync files from runner build workspace to production directory (excluding node_modules)
    - rsync -av --delete backend/ "$BACKEND_DEPLOY_DIR/" --exclude node_modules --exclude .env
    # 3. Install production dependencies and reload/start the application in PM2
    - cd "$BACKEND_DEPLOY_DIR"
    - npm ci --omit=dev
    - pm2 restart 24
  only:
    - main

# Deploy frontend assets locally to the web server's root folder
deploy-frontend:
  stage: deploy
  dependencies:
    - frontend-build
  script:
    # 1. Ensure target frontend directory exists
    - mkdir -p "$FRONTEND_DEPLOY_DIR"
    # 2. Sync built static assets
    - rsync -av --delete frontend/dist/ "$FRONTEND_DEPLOY_DIR/"
  only:
    - main


